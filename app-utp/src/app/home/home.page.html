<ion-header>
  <ion-toolbar color="danger">
    <ion-title>Registro UTP</ion-title>
  </ion-toolbar>
</ion-header>
<ion-content class="ion-padding">
  <div class="contenedor">
    <h1 class="titulo">App móvil híbrida</h1>
    <p>Complete los datos para validar el registro.</p>
    <ion-item>
      <ion-label position="stacked">Nombre completo</ion-label>
      <ion-input [(ngModel)]="nombre" placeholder="Ejemplo: Ana Torres"></ion-input>
    </ion-item>
    <ion-item>
      <ion-label position="stacked">Correo</ion-label>
      <ion-input [(ngModel)]="correo" placeholder="Ejemplo: ana@utp.edu.pe"></ion-input>
    </ion-item>
    <ion-item>
      <ion-label position="stacked">Tipo de aplicación</ion-label>
      <ion-select [(ngModel)]="tipoApp" placeholder="Seleccione una opción">
        <ion-select-option value="Académica">App académica</ion-select-option>
        <ion-select-option value="Ventas">App de ventas</ion-select-option>
        <ion-select-option value="Soporte">App de soporte</ion-select-option>
      </ion-select>
    </ion-item>
    <ion-button expand="block" color="danger" class="boton-principal" (click)="validarRegistro()">Validar
      registro</ion-button>
    <ion-button expand="block" fill="outline" color="medium" (click)="limpiar()">Limpiar</ion-button>
    <ion-card *ngIf="mensaje" [class.card-ok]="registroValido" [class.card-error]="!registroValido">
      <ion-card-content>{{ mensaje }}</ion-card-content>
    </ion-card>
  </div>
</ion-content>
